services:
  db:
    image: postgres:14-alpine
    container_name: datn_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tam130103}
      POSTGRES_DB: ${DB_DATABASE:-datn_social}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: datn_backend
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - ./backend/.env

    ports:
      - "3000:3000"
    volumes:
      - ./backend/uploads:/usr/src/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: datn_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80" # Maps local 5173 to container's Nginx port 80

volumes:
  pgdata:
