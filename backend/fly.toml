# fly.toml — Fly.io configuration for DATN Social Backend

app = "datn-social-backend"
primary_region = "sin"  # Singapore — closest to Vietnam

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false  # Disable cold starts!
  auto_start_machines = true
  min_machines_running = 1    # Always keep 1 instance alive

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
